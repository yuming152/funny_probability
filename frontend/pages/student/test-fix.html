<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试修复</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.8/dist/chart.umd.min.js"></script>
</head>
<body class="bg-gray-50 font-sans p-8">
    <h1 class="text-2xl font-bold text-gray-800 mb-6">测试修复结果</h1>
    
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
        <!-- 误差分布 -->
        <div class="bg-white rounded-xl shadow-md p-6">
            <h3 class="text-xl font-bold text-gray-800 mb-4">误差分布</h3>
            <div class="h-80">
                <canvas id="test-error-distribution-chart"></canvas>
            </div>
        </div>
        <!-- 置信度变化曲线 -->
        <div class="bg-white rounded-xl shadow-md p-6">
            <h3 class="text-xl font-bold text-gray-800 mb-4">置信度变化曲线</h3>
            <div class="h-80">
                <canvas id="test-confidence-change-chart"></canvas>
            </div>
        </div>
    </div>

    <button id="test-btn" class="px-8 py-3 bg-primary text-white rounded-lg hover:bg-blue-700 transition-all-300 font-medium flex items-center">
        <i class="fa fa-play mr-2"></i> 测试数据更新
    </button>

    <script>
        // 初始化图表
        let testErrorDistributionChart, testConfidenceChangeChart;

        function initTestCharts() {
            // 误差分布图表
            const errorCtx = document.getElementById('test-error-distribution-chart').getContext('2d');
            testErrorDistributionChart = new Chart(errorCtx, {
                type: 'histogram',
                data: {
                    datasets: [{
                        label: '误差分布',
                        data: [],
                        backgroundColor: 'rgba(59, 130, 246, 0.6)',
                        borderColor: 'rgba(59, 130, 246, 1)',
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    animation: false,
                    scales: {
                        y: {
                            beginAtZero: true,
                            title: {
                                display: true,
                                text: '频率'
                            }
                        },
                        x: {
                            title: {
                                display: true,
                                text: '误差值'
                            }
                        }
                    }
                }
            });

            // 置信度变化曲线
            const confidenceCtx = document.getElementById('test-confidence-change-chart').getContext('2d');
            testConfidenceChangeChart = new Chart(confidenceCtx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [{
                        label: '原始置信度',
                        data: [],
                        borderColor: 'rgba(249, 115, 22, 1)',
                        backgroundColor: 'rgba(249, 115, 22, 0.1)',
                        tension: 0.4,
                        fill: true
                    }, {
                        label: '修正后置信度',
                        data: [],
                        borderColor: 'rgba(16, 185, 129, 1)',
                        backgroundColor: 'rgba(16, 185, 129, 0.1)',
                        tension: 0.4,
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    animation: false,
                    scales: {
                        y: {
                            beginAtZero: true,
                            max: 1,
                            title: {
                                display: true,
                                text: '置信度'
                            }
                        },
                        x: {
                            title: {
                                display: true,
                                text: '样本序号'
                            }
                        }
                    }
                }
            });
        }

        // 生成测试数据
        function generateTestData() {
            const data = [];
            for (let i = 0; i < 100; i++) {
                const error = Math.random() < 0.1;
                const confidence = 0.5 + Math.random() * 0.5;
                const correctedConfidence = error ? Math.max(0.1, confidence * 0.8) : Math.min(0.99, confidence + 0.1);
                
                data.push({
                    id: i + 1,
                    trueLabel: Math.floor(Math.random() * 10),
                    predictedLabel: error ? (Math.floor(Math.random() * 9) + (Math.floor(Math.random() * 10) === Math.floor(Math.random() * 10) ? 1 : 0)) % 10 : Math.floor(Math.random() * 10),
                    confidence: confidence,
                    correctedConfidence: correctedConfidence,
                    error: error,
                    difficulty: Math.random()
                });
            }
            return data;
        }

        // 更新测试图表
        function updateTestCharts(data) {
            // 误差分布
            const errors = data.map(item => item.error ? 1 : 0);
            testErrorDistributionChart.data.datasets[0].data = errors;
            testErrorDistributionChart.update();

            // 置信度变化曲线
            const sampleLabels = data.slice(0, 50).map(item => item.id);
            const originalConfidence = data.slice(0, 50).map(item => item.confidence);
            const correctedConfidence = data.slice(0, 50).map(item => item.correctedConfidence);
            testConfidenceChangeChart.data.labels = sampleLabels;
            testConfidenceChangeChart.data.datasets[0].data = originalConfidence;
            testConfidenceChangeChart.data.datasets[1].data = correctedConfidence;
            testConfidenceChangeChart.update();
        }

        // 页面加载完成后初始化
        window.addEventListener('load', function() {
            initTestCharts();
            console.log('图表初始化完成');
        });

        // 测试按钮点击事件
        document.getElementById('test-btn').addEventListener('click', function() {
            const testData = generateTestData();
            updateTestCharts(testData);
            console.log('数据更新完成');
        });
    </script>
</body>
</html>
